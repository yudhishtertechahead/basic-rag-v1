<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RAG Chatbot</title>
  <!-- marked.js: converts LLM markdown (bold, bullets, etc.) to clean HTML -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e8eaf0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 760px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 24px 16px 16px;
    }

    h1 {
      text-align: center;
      font-size: 1.25rem;
      font-weight: 600;
      color: #a5b4fc;
      margin-bottom: 4px;
      letter-spacing: 0.02em;
    }

    .subtitle {
      text-align: center;
      font-size: 0.78rem;
      color: #555870;
      margin-bottom: 20px;
    }

    /* Chat history area */
    #messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-right: 4px;
      scrollbar-width: thin;
      scrollbar-color: #2a2d3e transparent;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: #2a2d3e; border-radius: 4px; }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #3a3d52;
    }

    .empty-state .icon { font-size: 2.5rem; }
    .empty-state p { font-size: 0.9rem; }

    /* Message bubbles */
    .msg {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .msg.user .avatar  { background: #4f46e5; color: #fff; }
    .msg.bot  .avatar  { background: #1e2030; color: #a5b4fc; border: 1px solid #2a2d3e; }

    .bubble {
      max-width: 78%;
      padding: 12px 15px;
      border-radius: 14px;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .msg.user .bubble {
      background: #4f46e5;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.bot .bubble {
      background: #1a1d2e;
      color: #d0d4e8;
      border: 1px solid #252840;
      border-bottom-left-radius: 4px;
    }

    /* Sources inside bot bubble */
    .sources {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #252840;
      font-size: 0.75rem;
      color: #6b7094;
    }

    /* Markdown rendered inside bot bubble */
    .msg.bot .bubble p        { margin-bottom: 0.5em; }
    .msg.bot .bubble p:last-child { margin-bottom: 0; }
    .msg.bot .bubble ul,
    .msg.bot .bubble ol       { padding-left: 1.3em; margin-bottom: 0.5em; }
    .msg.bot .bubble li       { margin-bottom: 0.2em; }
    .msg.bot .bubble strong   { color: #c5caed; font-weight: 600; }
    .msg.bot .bubble code     { background: #12141f; padding: 1px 5px; border-radius: 4px;
                                font-family: monospace; font-size: 0.85em; color: #a5b4fc; }
    .msg.bot .bubble h1,
    .msg.bot .bubble h2,
    .msg.bot .bubble h3       { font-size: 0.95rem; font-weight: 600; color: #c5caed;
                                margin: 0.5em 0 0.3em; }

    .sources span {
      display: inline-block;
      background: #1e2138;
      border: 1px solid #2e3258;
      border-radius: 6px;
      padding: 2px 8px;
      margin: 3px 3px 0 0;
      color: #8b90b8;
    }

    /* Thinking indicator */
    .thinking .bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 18px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4f46e5;
      animation: bounce 1.2s ease infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%           { transform: translateY(-6px); opacity: 1; }
    }

    /* Input bar */
    .input-bar {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      background: #1a1d2e;
      border: 1px solid #252840;
      border-radius: 14px;
      padding: 10px 14px;
      transition: border-color 0.2s;
    }

    .input-bar:focus-within { border-color: #4f46e5; }

    #input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #e8eaf0;
      font-size: 0.9rem;
      resize: none;
      max-height: 120px;
      font-family: inherit;
      line-height: 1.5;
    }

    #input::placeholder { color: #3a3d52; }

    #send-btn {
      background: #4f46e5;
      border: none;
      border-radius: 10px;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
      align-self: flex-end;
    }

    #send-btn:hover { background: #4338ca; }
    #send-btn:active { transform: scale(0.94); }
    #send-btn:disabled { background: #2a2d3e; cursor: not-allowed; }

    #send-btn svg { fill: #fff; width: 16px; height: 16px; }

    .hint {
      text-align: center;
      font-size: 0.7rem;
      color: #3a3d52;
      margin-top: 8px;
    }
  </style>
</head>
<body>
<div class="chat-wrapper">
  <h1>RAG Chatbot</h1>
  <p class="subtitle">Ask anything about your documents</p>

  <div id="messages">
    <div class="empty-state" id="empty">
      <div class="icon">🗂️</div>
      <p>Ask a question about your documents to get started</p>
    </div>
  </div>

  <div class="input-bar">
    <textarea
      id="input"
      rows="1"
      placeholder="Type your question..."
      autofocus
    ></textarea>
    <button id="send-btn" title="Send">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
  <p class="hint">Press Enter to send &nbsp;·&nbsp; Shift+Enter for new line</p>
</div>

<script>
  // ── Config ────────────────────────────────────────────────────────────────
  // Must match the running FastAPI server address
  const API_URL = "http://localhost:8000/chat";

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("input");
  const sendBtn    = document.getElementById("send-btn");
  const emptyEl    = document.getElementById("empty");

  // ── Auto-resize textarea ──────────────────────────────────────────────────
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  });

  // ── Send on Enter (Shift+Enter = new line) ────────────────────────────────
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener("click", sendMessage);

  // ── Add a message bubble to the chat ─────────────────────────────────────
  function addMessage(role, content, sources = []) {
    if (emptyEl) emptyEl.remove();

    const msg = document.createElement("div");
    msg.className = `msg ${role}`;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "user" ? "You" : "AI";

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    // Render markdown so **bold**, bullet points etc. display properly
    if (role === "bot") {
      bubble.innerHTML = marked.parse(content || "");
    } else {
      bubble.textContent = content;
    }

    // Add source chips for bot messages
    if (role === "bot" && sources.length > 0) {
      const sourcesEl = document.createElement("div");
      sourcesEl.className = "sources";
      sourcesEl.innerHTML = "Sources: ";
      sources.forEach(src => {
        const name = (src.source || "Unknown").split(/[\\/]/).pop();
        const page = src.page != null ? ` p.${src.page + 1}` : "";
        const chip = document.createElement("span");
        chip.textContent = name + page;
        sourcesEl.appendChild(chip);
      });
      bubble.appendChild(sourcesEl);
    }

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    return msg;
  }

  // ── Show "thinking" animation ─────────────────────────────────────────────
  function addThinking() {
    const msg = document.createElement("div");
    msg.className = "msg bot thinking";
    msg.innerHTML = `
      <div class="avatar">AI</div>
      <div class="bubble">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>`;
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return msg;
  }

  // ── Main send function ────────────────────────────────────────────────────
  async function sendMessage() {
    const question = inputEl.value.trim();
    if (!question) return;

    // Clear input
    inputEl.value = "";
    inputEl.style.height = "auto";

    // Show user message
    addMessage("user", question);

    // Disable input while waiting
    sendBtn.disabled = true;
    inputEl.disabled = true;

    // Show thinking indicator
    const thinkingEl = addThinking();

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question }),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || `Server error ${res.status}`);
      }

      const data = await res.json();

      thinkingEl.remove();
      addMessage("bot", data.answer, data.sources || []);

    } catch (err) {
      thinkingEl.remove();
      const msg = err.message.includes("fetch")
        ? "Cannot connect to the server. Make sure it is running:\nuv run uvicorn main:app --reload"
        : err.message;
      addMessage("bot", "Error: " + msg);
    } finally {
      sendBtn.disabled = false;
      inputEl.disabled = false;
      inputEl.focus();
    }
  }
</script>
</body>
</html>
